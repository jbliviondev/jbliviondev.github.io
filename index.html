<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JBlivionDev</title>
  <meta name="description" content="JBlivionDev — creator of Necromancer Idle: The Endless Drain.">
  <style>
    :root {
      --bg: #0c0f14;
      --panel: #141925;
      --border: #2a3140;
      --text: #e6e9ef;
      --muted: #8a93a6;
      --green: #4ade80;
      --green-lime: #b6e86a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background:
        radial-gradient(1200px 600px at 50% -10%, #10331f 0%, transparent 60%),
        var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      min-height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem 1.25rem;
      text-align: center;
    }
    .logo {
      width: min(560px, 92vw);
      height: auto;
      filter: drop-shadow(0 0 24px rgba(74, 222, 128, 0.18));
      margin-bottom: 1.5rem;
    }
    .name {
      font-size: 1.6rem; font-weight: 800; font-style: italic;
      letter-spacing: 0.01em;
      background: linear-gradient(100deg, #b6e86a 0%, #6fe08a 32%, #4ade80 62%, #5f7a3a 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; color: transparent;
      filter: drop-shadow(0 0 6px rgba(74, 222, 128, 0.35));
      margin-bottom: 0.4rem;
    }
    .tagline { color: var(--muted); font-size: 1rem; margin-bottom: 2.25rem; max-width: 40ch; }
    .buttons { display: flex; flex-direction: column; gap: 0.9rem; width: min(340px, 90vw); }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 0.6rem;
      padding: 0.85rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      color: var(--text);
      font-size: 1.02rem; font-weight: 700;
      text-decoration: none;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn .ico { font-size: 1.2rem; line-height: 1; }
    .btn-steam:hover   { border-color: var(--green);  box-shadow: 0 0 18px rgba(74, 222, 128, 0.45); }
    .btn-coffee { background: #ffdd00; color: #14120a; border-color: #d9bb00; }
    .btn-coffee:hover  { box-shadow: 0 0 18px rgba(255, 221, 0, 0.55); }
    .btn-paypal { background: #0070ba; color: #fff; border-color: #005a96; }
    .btn-paypal:hover  { box-shadow: 0 0 18px rgba(0, 112, 186, 0.6); }
    footer { margin-top: 2.5rem; color: var(--muted); font-size: 0.82rem; }
    footer a { color: var(--green); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <img class="logo" src="LOGO.png" alt="Necromancer Idle: The Endless Drain">

  <div class="name">JBlivionDev</div>
  <p class="tagline">Independent game developer. Creator of <em>Necromancer Idle: The Endless Drain</em>.</p>

  <div class="buttons">
    <a class="btn btn-steam" href="https://store.steampowered.com/app/4936120" target="_blank" rel="noopener">
      <span class="ico">🎮</span> View on Steam
    </a>

    <!-- BuyMeACoffee Link -->
    <a class="btn btn-coffee" href="https://buymeacoffee.com/jbliviondevE" target="_blank" rel="noopener">
      <span class="ico">☕</span> Buy me a coffee
    </a>

    <!-- Paypal Link -->
    <a class="btn btn-paypal" href="https://www.paypal.com/paypalme/jbliviondev" target="_blank" rel="noopener">
      <span class="ico">💜</span> Support me on PayPal
    </a>
  </div>

  <footer>
    © <span id="year"></span> JBlivionDev · <a href="https://github.com/jbliviondev" target="_blank" rel="noopener">GitHub</a>
  </footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
